version: '3.8'

services:
  library-dog:
    # Default build is the standard image (~150MB, no Playwright). For Anna's
    # Archive / Libgen scraping, build with INSTALL_PLAYWRIGHT=true:
    #   build:
    #     context: .
    #     args:
    #       INSTALL_PLAYWRIGHT: "true"
    # Or use the published '-grey' image variant from GHCR:
    #   image: ghcr.io/axolotl-industries/library-dog:latest-grey
    build: .
    ports:
      - "80:80"
    environment:
      # --- Runtime user ---
      # Match these to the UID/GID of whoever owns your host downloads dir
      # (and your Calibre / Komga library, if you're sharing the volume).
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}

      # --- Auth ---
      # Single shared password. If unset and TRUSTED_PROXY_AUTH is also unset, every
      # route is open — fine on a private LAN, fatal on the public internet.
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
      # Trust Remote-User / X-Forwarded-User from a reverse proxy (Authelia, Authentik,
      # traefik forward-auth). When set, Library Dog MUST only be reachable through that
      # proxy, otherwise the header is trivially spoofable.
      - TRUSTED_PROXY_AUTH=${TRUSTED_PROXY_AUTH:-false}
      # Long random string used to sign session cookies. If unset, a per-process
      # random secret is used and everyone is signed out on each container restart.
      #   openssl rand -base64 48
      - SESSION_SECRET=${SESSION_SECRET}
      # Set to 'true' once Library Dog is only reachable over HTTPS (e.g. behind
      # Cloudflare). Browsers will then refuse to send the session cookie over http.
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}

      # --- Indexers / downloaders (optional) ---
      # Point at Prowlarr's API root (NOT a per-indexer URL — that's the legacy
      # form). Library Dog enumerates every indexer Prowlarr knows about and lets
      # you enable / disable / prioritise them in the UI. Legacy URLs ending in
      # /<id> still work (the trailing segment is stripped), but you'll only see
      # one indexer.
      #   New form: http://prowlarr:9696
      #   Legacy:   http://prowlarr:9696/15   (still tolerated)
      - PROWLARR_URL=${PROWLARR_URL:-}
      - PROWLARR_KEY=${PROWLARR_KEY:-}
      # SABnzbd for any NZB results returned by the indexer.
      - SABNZBD_URL=${SABNZBD_URL:-}
      - SABNZBD_KEY=${SABNZBD_KEY:-}
      # qBittorrent for any torrent results. qBit's save path is /app/torrents
      # by default — a SEPARATE volume from /app/downloads. Why: a torrent's
      # files have to stay where qBit put them in order to keep seeding (private
      # tracker users will have ratio rules), so we leave them there and
      # hardlink the books up to /app/downloads. The qBittorrent container must
      # also mount the same path (e.g. /downloads inside qBit pointing at the
      # ./torrents host dir).
      - QBIT_URL=${QBIT_URL:-}
      - QBIT_USER=${QBIT_USER:-}
      - QBIT_PASS=${QBIT_PASS:-}
      - QBIT_SAVE_PATH=${QBIT_SAVE_PATH:-/app/torrents}
      - QBIT_CATEGORY=${QBIT_CATEGORY:-books}

      # --- Library awareness via OPDS (optional) ---
      # Point at any OPDS-serving library (Calibre-Web / Calibre-Web-Automated,
      # Kavita, Komga, Ubooquity, plain Calibre, ...) and Library Dog will mark
      # books that are already in your library so you don't re-download them.
      # The bibliography still shows them — flip the in-UI toggle to hide.
      #
      # OPDS_URL is the catalog ROOT (the page the server's OPDS feed starts at).
      # Examples:
      #   Calibre-Web / CWA: http://cwa:8083/opds
      #   Komga:             http://komga:25600/opds/v1.2/catalog
      #   Kavita:            http://kavita:5000/api/opds/<api-key>
      #   Calibre server:    http://calibre:8080/opds
      #
      # Auth is HTTP Basic for CW/CWA/Komga (set username + password). Kavita
      # embeds its API key in the URL path — leave username/password blank in
      # that case. Recommended: create a dedicated read-only user in your
      # library server rather than reusing your admin credentials.
      - OPDS_URL=${OPDS_URL:-}
      - OPDS_USERNAME=${OPDS_USERNAME:-}
      - OPDS_PASSWORD=${OPDS_PASSWORD:-}

      # --- Grey sources (off by default) ---
      # Anna's Archive + Libgen scraping. Legally grey in many jurisdictions; also
      # drags in a Playwright/Chromium runtime. Project Gutenberg + Newznab indexers
      # stay always-on regardless of this setting. Set to 'true' to opt in.
      - ENABLE_GREY_SOURCES=${ENABLE_GREY_SOURCES:-false}
    volumes:
      # Library root — what Calibre / Calibre-Web-Automated ingests from. SAB
      # and Project Gutenberg / mirror downloads land here directly, torrent
      # downloads are hardlinked in from /app/torrents on completion.
      - ./downloads:/app/downloads
      # Torrent seed root — qBittorrent must mount the same host path. Skip
      # this volume entirely if you're not using qBit.
      - ./torrents:/app/torrents
    restart: unless-stopped
