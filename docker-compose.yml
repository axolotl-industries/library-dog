version: '3.8'

services:
  library-dog:
    build: .
    ports:
      - "80:80"
    environment:
      # --- Runtime user ---
      # Match these to the UID/GID of whoever owns your host downloads dir
      # (and your Calibre / Komga library, if you're sharing the volume).
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}

      # --- Auth ---
      # Single shared password. If unset and TRUSTED_PROXY_AUTH is also unset, every
      # route is open — fine on a private LAN, fatal on the public internet.
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
      # Trust Remote-User / X-Forwarded-User from a reverse proxy (Authelia, Authentik,
      # traefik forward-auth). When set, Library Dog MUST only be reachable through that
      # proxy, otherwise the header is trivially spoofable.
      - TRUSTED_PROXY_AUTH=${TRUSTED_PROXY_AUTH:-false}
      # Long random string used to sign session cookies. If unset, a per-process
      # random secret is used and everyone is signed out on each container restart.
      #   openssl rand -base64 48
      - SESSION_SECRET=${SESSION_SECRET}
      # Set to 'true' once Library Dog is only reachable over HTTPS (e.g. behind
      # Cloudflare). Browsers will then refuse to send the session cookie over http.
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}

      # --- Indexers / downloaders (optional) ---
      # Point at Prowlarr's API root (NOT a per-indexer URL — that's the legacy
      # form). Library Dog enumerates every indexer Prowlarr knows about and lets
      # you enable / disable / prioritise them in the UI. Legacy URLs ending in
      # /<id> still work (the trailing segment is stripped), but you'll only see
      # one indexer.
      #   New form: http://prowlarr:9696
      #   Legacy:   http://prowlarr:9696/15   (still tolerated)
      - PROWLARR_URL=${PROWLARR_URL:-}
      - PROWLARR_KEY=${PROWLARR_KEY:-}
      # SABnzbd for any NZB results returned by the indexer.
      - SABNZBD_URL=${SABNZBD_URL:-}
      - SABNZBD_KEY=${SABNZBD_KEY:-}
      # qBittorrent for any torrent results. The qBit container must mount the same
      # downloads volume Library Dog writes to (or set QBIT_SAVE_PATH to a path that
      # both containers can see), otherwise qBit downloads land somewhere we can't
      # ingest.
      - QBIT_URL=${QBIT_URL:-}
      - QBIT_USER=${QBIT_USER:-}
      - QBIT_PASS=${QBIT_PASS:-}
      - QBIT_SAVE_PATH=${QBIT_SAVE_PATH:-/app/downloads}
      - QBIT_CATEGORY=${QBIT_CATEGORY:-books}

      # --- Grey sources (off by default) ---
      # Anna's Archive + Libgen scraping. Legally grey in many jurisdictions; also
      # drags in a Playwright/Chromium runtime. Project Gutenberg + Newznab indexers
      # stay always-on regardless of this setting. Set to 'true' to opt in.
      - ENABLE_GREY_SOURCES=${ENABLE_GREY_SOURCES:-false}
    volumes:
      - ./downloads:/app/downloads
    restart: unless-stopped
