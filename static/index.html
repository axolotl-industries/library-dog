<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Library Dog</title>
    <style>
        :root {
            --primary: #00ff00;
            --bg: #000000;
            --card-bg: #000000;
            --text: #00ff00;
            --border: #00ff00;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            max-width: 900px;
            margin: 0 auto;
            padding: 15px;
            background: var(--bg);
            color: var(--text);
            text-transform: uppercase;
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 1000;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        h1, h3, h4 { color: var(--primary); margin-top: 0; letter-spacing: 2px; }
        h1 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border: 2px solid var(--border);
            margin-bottom: 20px;
            position: relative;
        }

        .card::before {
            content: attr(data-label);
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--bg);
            padding: 0 5px;
            font-size: 12px;
        }

        .search-group { display: flex; flex-direction: column; gap: 15px; }
        @media (min-width: 600px) { .search-group { flex-direction: row; align-items: center; } }

        input {
            padding: 12px;
            border: 1px solid var(--border);
            background: #000;
            color: var(--primary);
            font-family: inherit;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        button {
            padding: 12px 24px;
            background: var(--primary);
            color: black;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            font-family: inherit;
            width: 100%;
        }
        button:hover { background: white; }
        button:disabled { background: #004400; color: #008800; cursor: not-allowed; }

        .author-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 15px; }
        .author-card {
            border: 1px solid var(--border);
            padding: 15px;
            cursor: pointer;
            background: #000;
        }
        .author-card:hover { background: #004400; border-color: white; }

        .author-header { display: flex; gap: 12px; align-items: flex-start; }
        .author-photo {
            width: 80px; height: 110px;
            filter: grayscale(1) sepia(1) hue-rotate(60deg) brightness(1.2);
            border: 1px solid var(--primary);
            object-fit: cover;
        }
        .author-info h4 { margin: 0; font-size: 18px; }
        .author-info p { margin: 4px 0; font-size: 13px; color: var(--text); }
        .author-bio { font-size: 13px; margin: 10px 0; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; line-height: 1.4; }
        .author-top-work { font-weight: bold; font-size: 12px; border-top: 1px dashed var(--border); padding-top: 8px; }

        .table-container { width: 100%; overflow-x: auto; border: 1px solid var(--border); margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 400px; }
        th { background: #004400; color: white; text-align: left; padding: 12px 8px; border-bottom: 2px solid var(--border); }
        td { padding: 12px 8px; border-bottom: 1px solid #222; }
        tr:hover { background: #001100; }

        .chk-col { width: 50px; text-align: center; }

        /* Session panels */
        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .session-title { font-size: 14px; font-weight: bold; letter-spacing: 1px; }
        .session-btns { display: flex; gap: 8px; flex-shrink: 0; }

        .btn-inline {
            width: auto;
            padding: 5px 14px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-dismiss {
            background: none;
            border: 1px solid var(--border);
            color: var(--primary);
            font-size: 18px;
            line-height: 1;
            padding: 3px 12px;
        }
        .btn-dismiss:hover { background: var(--primary); color: black; }
        .btn-dismiss.running { border-color: #ff3b30; color: #ff3b30; }
        .btn-dismiss.running:hover { background: #ff3b30; color: black; }
        .btn-grab {
            background: none;
            border: 1px solid var(--border);
            color: var(--primary);
            padding: 4px 12px;
        }
        .btn-grab:hover { background: var(--primary); color: black; }

        .progress-container { font-family: inherit; color: var(--primary); margin: 10px 0 8px; font-size: 14px; font-weight: bold; }
        .progress-text { font-family: inherit; color: var(--primary); margin-bottom: 4px; font-size: 13px; }

        .session-log {
            background: #000;
            color: var(--primary);
            padding: 15px;
            height: 260px;
            overflow-y: auto;
            font-family: inherit;
            font-size: 14px;
            border: 1px solid #333;
        }
        .log-entry { margin-bottom: 4px; display: flex; gap: 12px; align-items: flex-start; }
        .log-icon { flex-shrink: 0; font-weight: bold; }
        .log-msg { line-height: 1.2; word-break: break-all; }

        .settings-link { text-align: right; margin-bottom: 15px; }
        .settings-link button.link {
            background: none; border: 1px solid var(--primary); color: var(--primary);
            width: auto; padding: 5px 15px; font-size: 12px; cursor: pointer; font-family: inherit;
        }
        .settings-link button.link:hover { background: var(--primary); color: black; }

        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0,255,0,.3); border-radius: 50%; border-top-color: var(--primary); animation: spin 1s ease-in-out infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .card { padding: 15px; }
            button { padding: 15px; }
        }
    </style>
</head>
<body>
    <h1>SYSTEM::BOOKFINDER_V2.0</h1>
    <div class="settings-link">
        <form method="post" action="/logout" style="margin: 0;"><button type="submit" class="link">BYE</button></form>
    </div>

    <div class="card" data-label=" [ SEARCH ] ">
        <div class="search-group">
            <input type="text" id="author" placeholder="ENTER AUTHOR NAME" onkeyup="if(event.key==='Enter') search()">
            <button id="search-btn" onclick="search()">EXECUTE</button>
        </div>
        <input type="text" id="query" placeholder="FILTER TITLE (OPTIONAL)" style="margin-top:15px;" onkeyup="if(event.key==='Enter') search()">
    </div>

    <div id="author-select-card" class="card" data-label=" [ AUTHORS ] " style="display:none;">
        <h3>SELECT AUTHOR</h3>
        <div id="author-grid" class="author-grid"></div>
    </div>

    <div id="results-card" class="card" data-label=" [ RESULTS ] " style="display:none;">
        <h3 id="author-title"></h3>
        <div class="table-container"><div id="results-list"></div></div>
        <div style="margin-top: 20px;">
            <button id="download-btn" onclick="startDownload()">PULL SELECTED</button>
        </div>
    </div>

    <div id="candidates-card" class="card" data-label=" [ SELECT SOURCE ] " style="display:none;">
        <h3 id="candidates-title"></h3>
        <div class="table-container" id="candidates-table"></div>
        <div style="margin-top: 15px;">
            <button onclick="useMirrors()">USE MIRRORS INSTEAD</button>
        </div>
    </div>

    <div id="sessions"></div>

    <script>
        let currentBooks = [], currentAuthor = "", pendingBook = null;
        const activeSessions = {};
        let _candidates = [];

        async function apiFetch(url, options) {
            const res = await fetch(url, options);
            if (res.status === 401) { window.location.href = '/login'; return new Promise(() => {}); }
            return res;
        }

        function fmtSize(n) {
            if (!n) return '?';
            if (n < 1024) return n + 'B';
            if (n < 1048576) return (n / 1024).toFixed(1) + 'KB';
            if (n < 1073741824) return (n / 1048576).toFixed(1) + 'MB';
            return (n / 1073741824).toFixed(1) + 'GB';
        }

        async function search() {
            const a = document.getElementById('author').value; if (!a) return;
            const btn = document.getElementById('search-btn');
            btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>SEARCHING...';

            document.getElementById('author-select-card').style.display = 'none';
            document.getElementById('results-card').style.display = 'none';
            document.getElementById('candidates-card').style.display = 'none';

            try {
                const res = await apiFetch(`/search?author=${encodeURIComponent(a)}`);
                const data = await res.json();
                if (data.error) return alert(data.error);

                const grid = document.getElementById('author-grid');
                grid.innerHTML = '';
                data.authors.forEach(auth => {
                    const card = document.createElement('div');
                    card.className = 'author-card';
                    card.onclick = () => selectAuthor(auth.id, auth.name);
                    card.innerHTML = `
                        <div class="author-header">
                            <img class="author-photo" src="${auth.photo_url || 'https://openlibrary.org/static/images/icons/avatar_author-lg.png'}" onerror="this.src='https://openlibrary.org/static/images/icons/avatar_author-lg.png'">
                            <div class="author-info">
                                <h4>${auth.name}</h4>
                                <p>${auth.birth_date || ''}</p>
                                <p>${auth.work_count} works</p>
                            </div>
                        </div>
                        <div class="author-bio">${auth.bio || 'No biography available.'}</div>
                        <div class="author-top-work">Notable: ${auth.top_work || 'N/A'}</div>
                    `;
                    grid.appendChild(card);
                });
                document.getElementById('author-select-card').style.display = 'block';
            } finally {
                btn.disabled = false; btn.innerText = 'EXECUTE';
            }
        }

        async function selectAuthor(id, name) {
            document.getElementById('author-select-card').style.display = 'none';
            const btn = document.getElementById('search-btn');
            btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>FETCHING BIBLIOGRAPHY...';

            try {
                const q = document.getElementById('query').value;
                const res = await apiFetch(`/author_books?author_id=${encodeURIComponent(id)}&author_name=${encodeURIComponent(name)}&query=${encodeURIComponent(q)}`);
                const data = await res.json();

                currentAuthor = data.author; currentBooks = data.books;
                document.getElementById('author-title').innerText = `${data.books.length} BOOKS FOR ${data.author}`;
                document.getElementById('results-card').style.display = 'block';

                let h = `<table><tr><th class="chk-col"><input type="checkbox" checked onclick="toggleAll(this)"></th><th>YEAR</th><th>TITLE</th></tr>`;
                data.books.forEach((b, i) => h += `<tr><td class="chk-col"><input type="checkbox" class="book-chk" data-i="${i}" checked></td><td>${b.year || '-'}</td><td>${b.title}</td></tr>`);
                document.getElementById('results-list').innerHTML = h + '</table>';
            } finally {
                btn.disabled = false; btn.innerText = 'EXECUTE';
            }
        }

        function toggleAll(m) { document.querySelectorAll('.book-chk').forEach(c => c.checked = m.checked); }

        async function startDownload() {
            const idxs = Array.from(document.querySelectorAll('.book-chk:checked')).map(c => parseInt(c.dataset.i));
            if (!idxs.length) return alert('Select at least one book.');
            const books = idxs.map(i => currentBooks[i]);
            if (books.length === 1) {
                pendingBook = books[0];
                await showCandidates(books[0]);
            } else {
                await launchJob(books);
            }
        }

        async function showCandidates(book) {
            const btn = document.getElementById('download-btn');
            btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>SEARCHING USENET...';
            document.getElementById('candidates-card').style.display = 'none';
            try {
                const res = await apiFetch(`/candidates?author=${encodeURIComponent(currentAuthor)}&title=${encodeURIComponent(book.title)}`);
                const data = await res.json();
                if (!data.candidates || !data.candidates.length) {
                    await launchJob([book]);
                    return;
                }
                _candidates = data.candidates;
                document.getElementById('candidates-title').innerText = `SOURCES FOR: ${book.title}`;
                let h = `<table><tr><th>NZB TITLE</th><th>SIZE</th><th></th></tr>`;
                data.candidates.forEach((c, i) => {
                    h += `<tr><td style="max-width:500px;word-break:break-word;text-transform:none">${c.title}</td><td style="white-space:nowrap">${fmtSize(c.size)}</td><td><button class="btn-inline btn-grab" onclick="grabNzb(${i})">GRAB</button></td></tr>`;
                });
                document.getElementById('candidates-table').innerHTML = h + '</table>';
                document.getElementById('candidates-card').style.display = 'block';
                document.getElementById('candidates-card').scrollIntoView({ behavior: 'smooth' });
            } finally {
                btn.disabled = false; btn.innerText = 'PULL SELECTED';
            }
        }

        async function grabNzb(idx) {
            const nzb = _candidates[idx];
            document.getElementById('candidates-card').style.display = 'none';
            await launchJob([{ ...pendingBook, nzb_url: nzb.link }]);
        }

        async function useMirrors() {
            document.getElementById('candidates-card').style.display = 'none';
            await launchJob([pendingBook]);
        }

        async function launchJob(books) {
            const res = await apiFetch('/start_job', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ author: currentAuthor, books })
            });
            const { job_id } = await res.json();
            createSession(job_id, currentAuthor, books.length);
        }

        function createSession(jobId, author, total) {
            const panel = document.createElement('div');
            panel.className = 'card';
            panel.id = `session-${jobId}`;
            panel.dataset.label = ` [ ${author.toUpperCase().slice(0, 24)} ] `;
            panel.innerHTML = `
                <div class="session-header">
                    <span class="session-title">${author} &mdash; ${total} book${total !== 1 ? 's' : ''}</span>
                    <button class="btn-inline btn-dismiss running" id="dismiss-${jobId}" onclick="dismissSession('${jobId}')">&times;</button>
                </div>
                <div class="progress-text" id="prog-text-${jobId}">JOB: 0 / ${total} RECORDS</div>
                <div class="progress-container">
                    PROGRESS: <span id="prog-bar-${jobId}">[....................]</span> <span id="prog-pct-${jobId}">0%</span>
                </div>
                <div class="session-log" id="log-${jobId}"></div>
            `;
            document.getElementById('sessions').prepend(panel);
            activeSessions[jobId] = { ev: null, done: 0, total, logIndex: 0, running: true, closeOnDone: false };
            openStream(jobId);
        }

        function updateProgress(jobId) {
            const s = activeSessions[jobId]; if (!s) return;
            const pct = s.total ? Math.floor((s.done / s.total) * 100) : 0;
            const blocks = Math.floor(pct / 5);
            document.getElementById(`prog-bar-${jobId}`).innerText = '[' + '#'.repeat(blocks) + '.'.repeat(20 - blocks) + ']';
            document.getElementById(`prog-pct-${jobId}`).innerText = `${pct}%`;
            document.getElementById(`prog-text-${jobId}`).innerText = `JOB: ${s.done} / ${s.total} RECORDS`;
        }

        function openStream(jobId) {
            const s = activeSessions[jobId]; if (!s) return;
            const ev = new EventSource(`/stream/${jobId}?last_idx=${s.logIndex}`);
            s.ev = ev;

            ev.onmessage = e => {
                const msg = e.data;
                if (msg === ': heartbeat') return;
                s.logIndex++;

                const logDiv = document.getElementById(`log-${jobId}`);
                if (!logDiv) { ev.close(); return; }

                let icon = '[*]', color = '#00ff00', weight = 'normal', skip = false;

                if (msg.startsWith('SUCCESS:'))          { icon = '[DONE  ]'; color = '#00ff00'; weight = 'bold'; s.done++; }
                else if (msg.startsWith('FAILED:'))      { icon = '[ERROR ]'; color = '#ff3b30'; weight = 'bold'; s.done++; }
                else if (msg.startsWith('Searching'))    { icon = '[SEARCH]'; color = '#5ac8fa'; }
                else if (msg.includes('Gutenberg'))      { icon = '[GUTENB]'; color = '#ffd60a'; }
                else if (msg.includes('mirror'))         { icon = '[MIRROR]'; color = '#5856d6'; }
                else if (msg.startsWith('STOPPING') || msg === 'JOB_CANCELLED_BY_USER') { icon = '[CANCEL]'; color = '#ff9500'; }
                else if (msg === 'JOB_COMPLETE')         { icon = '[SYSTEM]'; color = '#8e8e93'; }
                else                                     { skip = true; }

                updateProgress(jobId);

                if (!skip) {
                    const entry = document.createElement('div');
                    entry.className = 'log-entry';
                    entry.innerHTML = `<span class="log-icon">${icon}</span><span class="log-msg" style="color:${color};font-weight:${weight}">${msg}</span>`;
                    logDiv.appendChild(entry);
                    logDiv.scrollTop = logDiv.scrollHeight;
                }

                if (msg === 'JOB_COMPLETE' || msg === 'JOB_CANCELLED_BY_USER') {
                    ev.close();
                    s.running = false;
                    const btn = document.getElementById(`dismiss-${jobId}`);
                    if (btn) btn.classList.remove('running');
                    if (s.closeOnDone) closeSession(jobId);
                }
            };

            ev.onerror = () => { ev.close(); setTimeout(() => openStream(jobId), 2000); };
        }

        async function dismissSession(jobId) {
            const s = activeSessions[jobId];
            if (!s) return;
            if (s.running) {
                s.closeOnDone = true;
                await apiFetch(`/stop_job/${jobId}`, { method: 'POST' });
            } else {
                closeSession(jobId);
            }
        }

        function closeSession(jobId) {
            const s = activeSessions[jobId];
            if (s && s.ev) s.ev.close();
            delete activeSessions[jobId];
            const panel = document.getElementById(`session-${jobId}`);
            if (panel) panel.remove();
        }
    </script>
</body>
</html>
